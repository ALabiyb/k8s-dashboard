# ── ClusterRoleBinding ────────────────────────────────────────────────────
# Binds the ClusterRole to our ServiceAccount
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-dashboard-reader
subjects:
  - kind: ServiceAccount
    name: k8s-dashboard
    namespace: k8s-dashboard
roleRef:
  kind: ClusterRole
  name: k8s-dashboard-reader
  apiGroup: rbac.authorization.k8s.io
