# ── Service ───────────────────────────────────────────────────────────────
# Exposes the dashboard inside the cluster. Add an Ingress below to make
# it reachable from outside.
apiVersion: v1
kind: Service
metadata:
  name: k8s-dashboard
  namespace: k8s-dashboard
  labels:
    app: k8s-dashboard
    app.kubernetes.io/part-of: k8s-dashboard
spec:
  selector:
    app: k8s-dashboard
  ports:
    - port: 80
      targetPort: 8080