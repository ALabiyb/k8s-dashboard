# ──────────────────────────────────────────────
# k8s-dashboard configuration
# Edit this file to change thresholds, SMTP, etc.
# ──────────────────────────────────────────────

server:
  port: 8099          # Port the dashboard web server listens on
  poll_interval: 30s  # How often to re-check all namespaces

# Namespaces to SKIP (system namespaces you don't want shown)
excluded_namespaces:
  - kube-system
  - kube-public
  - kube-node-lease
  - k8s-dashboard      # exclude our own namespace
  - metallb-system
  - rook-ceph
  - default
  - cilium-secrets
  - cert-manager

# Keycloak / OIDC single sign-on
# The client secret MUST be set via the OIDC_CLIENT_SECRET environment variable
# (or a Kubernetes Secret) — never put a real secret in this file.
# Note: use %20 for any spaces in the realm name in issuer_url.
#
# Access model (Path B — RBAC via SoftNet AD groups):
#   - Users log in via the `SoftNet AD` realm and the `k8s-dashboard` client.
#   - The client injects `k8s` into the token audience (Audience mapper), so
#     the same access token is later accepted by the K8s API for per-user
#     RBAC — see Obsidian: "K8s Dashboard OIDC RBAC Migration".
#   - Dashboard *role* (admin vs. viewer) is decided from the user's groups:
#       admin_group present in user.groups   → admin  (export, delete, etc.)
#       any other k8s-* group                → viewer (read-only, filtered by NS)
#       no k8s-* group                       → access_denied
oidc:
  enabled: true
  issuer_url: "https://keycloak.devops.softnethq.co.tz/realms/SoftNet%20AD"
  client_id: "k8s-dashboard"
  client_secret: ""                              # set via OIDC_CLIENT_SECRET env var
  redirect_url: "http://localhost:8099/auth/callback"  # override with OIDC_REDIRECT_URL
  admin_group: "k8s-cluster-admins"
  # Set true only when Keycloak uses an internal/self-signed CA not in the OS trust store.
  # DO NOT use in production with public CAs — disables certificate validation.
  tls_skip_verify: true

# Health score thresholds (percentage of healthy services)
thresholds:
  healthy: 100    # 100%        → green
  degraded: 70    # 70–99%      → amber/yellow
                  # below 70%   → red/critical

# Email notification settings
notifications:
  email:
    enabled: true
    smtp_host: "smtp.gmail.com"
    smtp_port: 587
    smtp_username: "you@gmail.com"
    smtp_password: "your-app-password"   # use an app password, not your real password
    from: "k8s-dashboard@yourorg.com"
    # Optional display name shown by mail clients as the sender ("K8s Dashboard
    # <k8s-dashboard@yourorg.com>"). Leave empty to send the bare address.
    # Note: the envelope sender stays bare regardless — SMTP servers like Zoho
    # reject envelopes with a display name.
    from_display_name: "K8s Dashboard"
    to:
      - "team@yourorg.com"
      - "oncall@yourorg.com"
    # Only send email when health STATE changes (green→amber, amber→red, etc.)
    # This prevents spam on every poll cycle
    on_state_change_only: true
    # Link inserted into the alert body's "View dashboard" call-to-action.
    # Leave empty to omit the link entirely.
    dashboard_url: "https://k8s-dashboard.dev.softnethq.co.tz"
    # true → send styled HTML (colored state badges, service list, button);
    # false → send plain text. Both templates share the same data.
    html_body: true
