<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>K8s Platform Health</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <script>
    (function () {
      var t = localStorage.getItem('k8s_theme') ||
        (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <style>
    /* ── Theme tokens ───────────────────────────────────────────────── */
    :root {
      --bg:             #f5f5f4;
      --bg-card:        #ffffff;
      --bg-secondary:   #f0efee;
      --text:           #1c1917;
      --text-muted:     #78716c;
      --text-faint:     #a8a29e;
      --border:         #e7e5e4;

      --healthy-dot:    #639922;
      --degraded-dot:   #BA7517;
      --critical-dot:   #A32D2D;
      --healthy-text:   #3B6D11;
      --degraded-text:  #854F0B;
      --critical-text:  #A32D2D;

      --badge-g-bg:     #EAF3DE; --badge-g-text: #3B6D11;
      --badge-a-bg:     #FAEEDA; --badge-a-text: #854F0B;
      --badge-r-bg:     #FCEBEB; --badge-r-text: #A32D2D;

      --role-admin-bg:  #dbeafe; --role-admin-text: #1d4ed8;

      --mock-bg: #fef3c7; --mock-border: #fcd34d; --mock-text: #92400e;
      --err-bg:  #fee2e2; --err-border:  #fca5a5; --err-text:  #b91c1c;
    }
    [data-theme="dark"] {
      --bg:             #1c1917;
      --bg-card:        #292524;
      --bg-secondary:   #211f1e;
      --text:           #fafaf9;
      --text-muted:     #a8a29e;
      --text-faint:     #78716c;
      --border:         #44403c;

      --healthy-dot:    #4ade80;
      --degraded-dot:   #f59e0b;
      --critical-dot:   #ef4444;
      --healthy-text:   #86efac;
      --degraded-text:  #fcd34d;
      --critical-text:  #fca5a5;

      --badge-g-bg:     #14532d; --badge-g-text: #86efac;
      --badge-a-bg:     #451a03; --badge-a-text: #fcd34d;
      --badge-r-bg:     #450a0a; --badge-r-text: #fca5a5;

      --role-admin-bg:  #1e3a8a; --role-admin-text: #93c5fd;

      --mock-bg: #451a03; --mock-border: #92400e; --mock-text: #fcd34d;
      --err-bg:  #450a0a; --err-border:  #7f1d1d; --err-text:  #fca5a5;
    }

    /* ── Reset ──────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--text);
      font-size: 16px; line-height: 1.5;
      transition: background .2s, color .2s;
      min-height: 100vh; display: flex; flex-direction: column;
    }
    .app {
      max-width: 1400px; width: 100%; margin: 0 auto; padding: 20px;
      flex: 1; display: flex; flex-direction: column;
    }

    /* ── Topbar ─────────────────────────────────────────────────────── */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px; gap: 12px; flex-wrap: wrap;
    }
    .topbar-title { font-size: 17px; font-weight: 500; display: flex; align-items: center; gap: 9px; }
    .k8s-icon { width: 28px; height: 28px; flex-shrink: 0; }
    .topbar-sub   { font-size: 14px; color: var(--text-muted); margin-top: 2px; }
    .topbar-right { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

    .user-chip {
      display: flex; align-items: center; gap: 6px;
      padding: 3px 8px; background: var(--bg-card);
      border: 0.5px solid var(--border); border-radius: 6px; font-size: 14px;
    }
    .user-chip strong { font-weight: 500; }
    .role-badge {
      font-size: 12px; font-weight: 600; padding: 1px 6px;
      border-radius: 99px; text-transform: uppercase; letter-spacing: .04em;
    }
    .role-badge.admin  { background: var(--role-admin-bg);  color: var(--role-admin-text); }
    .role-badge.viewer { background: var(--badge-g-bg);     color: var(--badge-g-text); }

    .icon-btn {
      background: var(--bg-card); border: 0.5px solid var(--border);
      border-radius: 6px; width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text-muted);
      transition: background .15s;
    }
    .icon-btn:hover { background: var(--bg-secondary); }
    .icon-btn svg { width: 13px; height: 13px; }

    .text-btn {
      background: var(--bg-card); border: 0.5px solid var(--border);
      border-radius: 6px; padding: 5px 10px; font-size: 14px;
      cursor: pointer; color: var(--text-muted);
      display: flex; align-items: center; gap: 5px; transition: background .15s;
    }
    .text-btn:hover { background: var(--bg-secondary); }
    .text-btn svg { width: 13px; height: 13px; }

    .logout-btn {
      background: var(--bg-card); border: 0.5px solid var(--border);
      border-radius: 6px; padding: 5px 10px;
      font-size: 14px; color: var(--text-muted); text-decoration: none;
      display: inline-flex; align-items: center; transition: background .15s, color .15s;
    }
    .logout-btn:hover { background: var(--bg-secondary); color: var(--text); }

    /* Export dropdown */
    .export-wrap { position: relative; display: none; }
    .export-menu {
      position: absolute; top: calc(100% + 4px); right: 0;
      background: var(--bg-card); border: 0.5px solid var(--border);
      border-radius: 6px; padding: 3px; min-width: 110px;
      box-shadow: 0 4px 16px rgba(0,0,0,.1); z-index: 60;
    }
    .export-menu a {
      display: flex; align-items: center; gap: 7px;
      padding: 6px 10px; font-size: 14px; color: var(--text);
      text-decoration: none; border-radius: 4px; cursor: pointer;
    }
    .export-menu a:hover { background: var(--bg-secondary); }
    .export-menu a svg { width: 12px; height: 12px; color: var(--text-muted); }

    /* ── Summary stats ──────────────────────────────────────────────── */
    .stats {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 8px; margin-bottom: 14px;
    }
    .stat {
      background: var(--bg-secondary); border: 0.5px solid var(--border);
      border-radius: 6px; padding: 10px 12px;
    }
    .stat-label { font-size: 13px; color: var(--text-muted); }
    .stat-val   { font-size: 22px; font-weight: 500; color: var(--text); }
    .stat-val.g { color: var(--healthy-text); }
    .stat-val.a { color: var(--degraded-text); }
    .stat-val.r { color: var(--critical-text); }

    /* ── Banners ─────────────────────────────────────────────────────── */
    .mock-banner {
      background: var(--mock-bg); border: 0.5px solid var(--mock-border);
      border-radius: 6px; padding: 7px 12px; margin-bottom: 12px;
      font-size: 14px; color: var(--mock-text);
      display: flex; align-items: center; gap: 8px;
    }
    .mock-dot { width: 7px; height: 7px; border-radius: 50%; background: #f59e0b; flex-shrink: 0; }
    .error-msg {
      background: var(--err-bg); border: 0.5px solid var(--err-border);
      border-radius: 6px; padding: 10px 14px; color: var(--err-text); margin-bottom: 12px;
      font-size: 15px;
    }
    .loading { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 16px; }
    @keyframes pulse  { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }
    @keyframes glow   { 0%, 100% { box-shadow: 0 0 0 0 rgba(163,45,45,.0); }
                        50%       { box-shadow: 0 0 0 4px rgba(163,45,45,.25); } }
    .checking  { animation: pulse 1.2s ease-in-out infinite; }
    .pcard.critical-pulse { animation: glow 2s ease-in-out infinite; }

    /* ── Grid section labels ─────────────────────────────────────────── */
    .grid-section {
      grid-column: 1 / -1;
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; font-weight: 600; letter-spacing: .07em;
      text-transform: uppercase; color: var(--text-muted);
      padding: 4px 0 2px;
    }
    .grid-section::after {
      content: ''; flex: 1; height: 0.5px; background: var(--border);
    }
    .grid-section.issues { color: var(--critical-text); }
    .grid-section .section-count {
      background: var(--badge-r-bg); color: var(--badge-r-text);
      font-size: 12px; padding: 1px 6px; border-radius: 99px;
    }
    .grid-section.healthy .section-count {
      background: var(--badge-g-bg); color: var(--badge-g-text);
    }

    /* ── Product grid ───────────────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 8px;
    }

    /* ── Product card (dot matrix) ──────────────────────────────────── */
    .pcard {
      background: var(--bg-card); border: 0.5px solid var(--border);
      border-radius: 6px; padding: 10px 12px;
      transition: border-color .15s;
    }
    /* Admin cards become clickable */
    .pcard.clickable { cursor: pointer; }
    .pcard.clickable:hover {
      border-color: var(--text-muted);
      box-shadow: 0 2px 10px rgba(0,0,0,.07);
      transform: translateY(-1px);
    }
    /* Selected state — border matches health color */
    .pcard.sel-healthy  { border: 1px solid var(--healthy-dot); }
    .pcard.sel-degraded { border: 1px solid var(--degraded-dot); }
    .pcard.sel-critical { border: 1px solid var(--critical-dot); }

    .pcard-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 6px;
    }
    .pname {
      font-size: 14px; font-weight: 500; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 88px;
    }
    .pbadge { font-size: 12px; padding: 1px 6px; border-radius: 99px; white-space: nowrap; }
    .pbadge.healthy  { background: var(--badge-g-bg); color: var(--badge-g-text); }
    .pbadge.degraded { background: var(--badge-a-bg); color: var(--badge-a-text); }
    .pbadge.critical { background: var(--badge-r-bg); color: var(--badge-r-text); }

    .pbar-bg   { height: 3px; background: var(--bg-secondary); border-radius: 99px; margin-bottom: 8px; overflow: hidden; }
    .pbar-fill { height: 100%; border-radius: 99px; }
    .pbar-fill.healthy  { background: var(--healthy-dot); }
    .pbar-fill.degraded { background: var(--degraded-dot); }
    .pbar-fill.critical { background: var(--critical-dot); }

    /* Dot + name list */
    .svc-list { display: flex; flex-direction: column; gap: 2px; }
    .svc-item { display: flex; align-items: center; gap: 5px; min-width: 0; }
    .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dot.healthy  { background: var(--healthy-dot); }
    .dot.degraded { background: var(--degraded-dot); }
    .dot.critical { background: var(--critical-dot); }
    .svc-lbl {
      font-size: 13px; color: var(--text); line-height: 1.4;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .pscore { font-size: 12px; color: var(--text-muted); margin-top: 6px; }

    /* ── Drawer overlay ─────────────────────────────────────────────── */
    .drawer-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.3); backdrop-filter: blur(2px);
      z-index: 100; opacity: 0; pointer-events: none;
      transition: opacity .22s;
    }
    .drawer-overlay.open { opacity: 1; pointer-events: auto; }

    /* ── Drawer panel ───────────────────────────────────────────────── */
    .drawer {
      position: fixed; top: 0; right: 0; bottom: 0; width: 420px; max-width: 100vw;
      background: var(--bg-card); border-left: 0.5px solid var(--border);
      box-shadow: -4px 0 32px rgba(0,0,0,.12);
      z-index: 101; display: flex; flex-direction: column;
      transform: translateX(100%);
      transition: transform .24s cubic-bezier(.4,0,.2,1);
    }
    .drawer.open { transform: translateX(0); }

    .drawer-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      padding: 16px 16px 12px; border-bottom: 0.5px solid var(--border); flex-shrink: 0;
    }
    .drawer-title { display: flex; align-items: center; gap: 8px; }
    .drawer-ns    { font-size: 17px; font-weight: 500; color: var(--text); }
    .drawer-sub   { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
    .drawer-close {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); font-size: 20px; line-height: 1; padding: 2px;
    }
    .drawer-close:hover { color: var(--text); }

    .drawer-score-wrap {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; border-bottom: 0.5px solid var(--border); flex-shrink: 0;
    }
    .drawer-bar-bg   { flex: 1; height: 4px; background: var(--bg-secondary); border-radius: 99px; overflow: hidden; }
    .drawer-bar-fill { height: 100%; border-radius: 99px; }
    .drawer-bar-fill.healthy  { background: var(--healthy-dot); }
    .drawer-bar-fill.degraded { background: var(--degraded-dot); }
    .drawer-bar-fill.critical { background: var(--critical-dot); }
    .drawer-score-text { font-size: 13px; color: var(--text-muted); white-space: nowrap; }

    .drawer-body { flex: 1; overflow-y: auto; padding: 0 0 20px; }

    .svc-section {
      font-size: 12px; font-weight: 600; letter-spacing: .06em;
      text-transform: uppercase; color: var(--text-muted);
      padding: 12px 16px 4px;
    }

    /* Each service row: dot │ name+reason │ kind pill │ replicas */
    .svc-row {
      display: grid;
      grid-template-columns: 8px 1fr auto auto;
      align-items: center;
      gap: 10px;
      padding: 9px 16px;
      border-bottom: 0.5px solid var(--border);
    }
    .svc-row:last-child { border-bottom: none; }

    .svc-dot { width: 8px; height: 8px; border-radius: 50%; }
    .svc-dot.healthy  { background: var(--healthy-dot); }
    .svc-dot.degraded { background: var(--degraded-dot); }
    .svc-dot.critical { background: var(--critical-dot); }

    .svc-info  { min-width: 0; }
    .svc-name  {
      font-size: 14px; font-weight: 500; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .svc-sub   { font-size: 13px; color: var(--text-muted); margin-top: 1px; }
    .svc-sub.critical { color: var(--critical-text); }
    .svc-sub.degraded { color: var(--degraded-text); }

    .svc-kind {
      font-size: 12px; color: var(--text-muted);
      background: var(--bg-secondary); padding: 2px 6px;
      border-radius: 4px; white-space: nowrap;
    }
    .svc-replicas {
      font-size: 14px; font-weight: 600;
      white-space: nowrap; font-variant-numeric: tabular-nums;
      min-width: 36px; text-align: right;
    }
    .svc-replicas.full    { color: var(--healthy-text); }
    .svc-replicas.partial { color: var(--degraded-text); }
    .svc-replicas.none    { color: var(--critical-text); }

    /* ── Footer — always at the bottom ─────────────────────────────── */
    .app-footer {
      margin-top: auto; padding: 14px 0 4px;
      border-top: 0.5px solid var(--border);
      text-align: center; font-size: 13px; color: var(--text-faint);
    }

    /* ── Responsive ─────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      .grid  { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<!-- ── Detail drawer (admin drill-down) ──────────────────────────── -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDetail()"></div>
<aside class="drawer" id="detail-drawer">
  <div class="drawer-header">
    <div>
      <div class="drawer-title">
        <span class="drawer-ns" id="d-ns"></span>
        <span class="pbadge" id="d-badge"></span>
      </div>
      <div class="drawer-sub" id="d-sub"></div>
    </div>
    <button class="drawer-close" onclick="closeDetail()" title="Close (Esc)">&#215;</button>
  </div>
  <div class="drawer-score-wrap">
    <div class="drawer-bar-bg"><div class="drawer-bar-fill" id="d-bar"></div></div>
    <span class="drawer-score-text" id="d-score"></span>
  </div>
  <div class="drawer-body" id="d-body"></div>
</aside>

<div class="app">

  <!-- ── Topbar ─────────────────────────────────────────────────────── -->
  <div class="topbar">
    <div>
      <div class="topbar-title">
        <svg class="k8s-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="12" fill="#326CE5"/>
          <circle cx="12" cy="12" r="9" fill="none" stroke="white" stroke-width="1.4"/>
          <circle cx="12" cy="12" r="2.7" fill="white"/>
          <line x1="12" y1="3.5" x2="12" y2="9.3" stroke="white" stroke-width="1.5" stroke-linecap="round" transform="rotate(0 12 12)"/>
          <line x1="12" y1="3.5" x2="12" y2="9.3" stroke="white" stroke-width="1.5" stroke-linecap="round" transform="rotate(51.43 12 12)"/>
          <line x1="12" y1="3.5" x2="12" y2="9.3" stroke="white" stroke-width="1.5" stroke-linecap="round" transform="rotate(102.86 12 12)"/>
          <line x1="12" y1="3.5" x2="12" y2="9.3" stroke="white" stroke-width="1.5" stroke-linecap="round" transform="rotate(154.29 12 12)"/>
          <line x1="12" y1="3.5" x2="12" y2="9.3" stroke="white" stroke-width="1.5" stroke-linecap="round" transform="rotate(205.71 12 12)"/>
          <line x1="12" y1="3.5" x2="12" y2="9.3" stroke="white" stroke-width="1.5" stroke-linecap="round" transform="rotate(257.14 12 12)"/>
          <line x1="12" y1="3.5" x2="12" y2="9.3" stroke="white" stroke-width="1.5" stroke-linecap="round" transform="rotate(308.57 12 12)"/>
        </svg>
        Platform health
      </div>
      <div class="topbar-sub" id="last-checked">Loading&hellip;</div>
    </div>
    <div class="topbar-right">

      <div class="user-chip" id="user-chip" style="display:none">
        <strong id="user-name"></strong>
        <span class="role-badge" id="role-badge"></span>
      </div>

      <button class="icon-btn" onclick="toggleTheme()" title="Toggle dark/light theme">
        <svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>

      <!-- Export (admin only) -->
      <div class="export-wrap" id="export-wrap">
        <button class="text-btn" onclick="toggleExportMenu(event)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Export
        </button>
        <div class="export-menu" id="export-menu" style="display:none">
          <a onclick="exportData('json')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
            </svg>JSON
          </a>
          <a onclick="exportData('csv')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
            </svg>CSV
          </a>
        </div>
      </div>

      <!-- Refresh (hidden for viewer) -->
      <button class="text-btn" id="refresh-btn" onclick="fetchData()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M1 4v6h6M23 20v-6h-6"/>
          <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
        </svg>
        Refresh
      </button>

      <a href="/logout" class="logout-btn">Sign out</a>
    </div>
  </div>

  <!-- ── Mock / Error banners ──────────────────────────────────────── -->
  <div class="mock-banner" id="mock-banner" style="display:none">
    <div class="mock-dot"></div>
    <strong>Mock mode</strong> &mdash; showing fake data. Connect a real kubeconfig to see your cluster.
  </div>
  <div class="error-msg" id="error-msg" style="display:none"></div>

  <!-- ── Summary stats ─────────────────────────────────────────────── -->
  <div class="stats">
    <div class="stat"><div class="stat-label">Total services</div><div class="stat-val"  id="s-total">&mdash;</div></div>
    <div class="stat"><div class="stat-label">Healthy</div>        <div class="stat-val g" id="s-healthy">&mdash;</div></div>
    <div class="stat"><div class="stat-label">Degraded</div>       <div class="stat-val a" id="s-degraded">&mdash;</div></div>
    <div class="stat"><div class="stat-label">Down</div>           <div class="stat-val r" id="s-down">&mdash;</div></div>
  </div>

  <!-- ── Product grid ──────────────────────────────────────────────── -->
  <div id="product-grid" class="grid">
    <div class="loading" style="grid-column:1/-1">Connecting to Kubernetes API&hellip;</div>
  </div>

  <footer class="app-footer">
    SoftNet DevSecOps Platform &nbsp;&middot;&nbsp; &copy; 2026 Labiyb M. Said &nbsp;&middot;&nbsp; DevSecOps Engineer
  </footer>
</div>

<script>
  const REFRESH_MS = 30_000;
  const THEME_KEY  = 'k8s_theme';

  let currentRole        = null;
  let currentSummaryData = null;
  let selectedNs         = null;

  // ── Theme ──────────────────────────────────────────────────────────
  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    const icon = document.getElementById('theme-icon');
    if (t === 'dark') {
      icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
    } else {
      icon.innerHTML =
        '<circle cx="12" cy="12" r="5"/>' +
        '<line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>' +
        '<line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>' +
        '<line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>' +
        '<line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>' +
        '<line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>' +
        '<line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
    }
  }
  function toggleTheme() {
    const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    localStorage.setItem(THEME_KEY, next);
    applyTheme(next);
  }
  applyTheme(document.documentElement.getAttribute('data-theme') || 'light');

  // ── User / Role ────────────────────────────────────────────────────
  async function loadUser() {
    try {
      const res = await fetch('/api/me');
      if (!res.ok) return;
      const { username, role } = await res.json();
      currentRole = role;
      document.getElementById('user-name').textContent = username;
      const badge = document.getElementById('role-badge');
      badge.textContent = role;
      badge.className   = 'role-badge ' + role;
      document.getElementById('user-chip').style.display = 'flex';
      applyRoleUI(role);
    } catch(_) {}
  }

  function applyRoleUI(role) {
    document.getElementById('export-wrap').style.display =
      role === 'admin' ? 'block' : 'none';
    document.getElementById('refresh-btn').style.display =
      role === 'viewer' ? 'none' : '';
    if (role === 'admin') {
      document.querySelectorAll('.pcard').forEach(c => c.classList.add('clickable'));
    }
  }

  // ── Mock mode banner ───────────────────────────────────────────────
  async function checkMode() {
    try {
      const res  = await fetch('/api/mode');
      const data = await res.json();
      document.getElementById('mock-banner').style.display = data.mock ? 'flex' : 'none';
    } catch(_) {}
  }

  // ── Data fetch & render ────────────────────────────────────────────
  async function fetchData() {
    const sub = document.getElementById('last-checked');
    sub.textContent = 'Refreshing…';
    sub.classList.add('checking');
    try {
      const res = await fetch('/api/summary');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      currentSummaryData = data;
      renderSummary(data);
      renderGrid(data.Products || []);
      document.getElementById('error-msg').style.display = 'none';
      sub.textContent = `Last checked: ${new Date().toLocaleTimeString()}`;
    } catch(err) {
      showError(`Failed to load data: ${err.message}`);
      sub.textContent = 'Check failed';
    } finally {
      sub.classList.remove('checking');
    }
  }

  function renderSummary(data) {
    document.getElementById('s-total').textContent    = data.TotalServices     ?? 0;
    document.getElementById('s-healthy').textContent  = data.HealthyServices   ?? 0;
    document.getElementById('s-degraded').textContent = data.DegradedServices  ?? 0;
    document.getElementById('s-down').textContent     = data.UnhealthyServices ?? 0;
  }

  // Map Go status ("Healthy" / "Degraded" / "Unhealthy") → CSS class
  function statusCls(s) {
    if (s === 'Healthy')  return 'healthy';
    if (s === 'Degraded') return 'degraded';
    return 'critical';
  }

  function renderGrid(products) {
    const grid = document.getElementById('product-grid');
    if (!products.length) {
      grid.innerHTML = '<div class="loading" style="grid-column:1/-1">No namespaces found.</div>';
      return;
    }

    const issues  = products.filter(p => p.Health !== 'Healthy')
                            .sort((a,b) => (a.Health === 'Unhealthy' ? 0 : 1) - (b.Health === 'Unhealthy' ? 0 : 1));
    const healthy = products.filter(p => p.Health === 'Healthy');

    let html = '';
    if (issues.length) {
      html += `<div class="grid-section issues">
        Issues <span class="section-count">${issues.length}</span>
      </div>`;
      html += issues.map(renderCard).join('');
    }
    if (healthy.length) {
      html += `<div class="grid-section healthy">
        Healthy <span class="section-count">${healthy.length}</span>
      </div>`;
      html += healthy.map(renderCard).join('');
    }

    const sorted = [...issues, ...healthy];
    grid.innerHTML = html;

    // Admin: make cards clickable
    if (currentRole === 'admin') {
      grid.querySelectorAll('.pcard').forEach(c => c.classList.add('clickable'));
    }

    // Critical cards get a pulsing glow
    grid.querySelectorAll('.pcard').forEach(card => {
      if (card.querySelector('.pbadge.critical')) card.classList.add('critical-pulse');
    });

    // Restore selection highlight after re-render
    if (selectedNs) {
      const selProduct = sorted.find(p => p.Namespace === selectedNs);
      if (selProduct) {
        grid.querySelectorAll('.pcard').forEach(c => {
          if (c.dataset.ns === selectedNs)
            c.classList.add('sel-' + statusCls(selProduct.Health));
        });
        openDetail(selProduct);
      } else {
        selectedNs = null;
        renderPanel(null);
      }
    }
  }

  function renderCard(p) {
    const level = statusCls(p.Health);
    const score = p.ScorePercent ?? 0;
    const rows = (p.Services || []).map(s => {
      const sc = statusCls(s.Status);
      return `<div class="svc-item" title="${escHtml(s.Name)}: ${escHtml(s.Reason)}">
        <div class="dot ${sc}"></div>
        <span class="svc-lbl">${escHtml(s.Name)}</span>
      </div>`;
    }).join('');
    const badgeLabel = p.Health === 'Unhealthy' ? 'critical' : p.Health.toLowerCase();
    return `
      <div class="pcard" data-ns="${escHtml(p.Namespace)}">
        <div class="pcard-top">
          <span class="pname" title="${escHtml(p.DisplayName || p.Namespace)}">${escHtml(p.DisplayName || p.Namespace)}</span>
          <span class="pbadge ${level}">${badgeLabel}</span>
        </div>
        <div class="pbar-bg"><div class="pbar-fill ${level}" style="width:${score}%"></div></div>
        <div class="svc-list">${rows}</div>
        <div class="pscore">${p.HealthyCount}/${p.TotalCount} healthy</div>
      </div>`;
  }

  // ── Card click — admin drill-down ──────────────────────────────────
  document.getElementById('product-grid').addEventListener('click', e => {
    if (currentRole !== 'admin') return;
    const card = e.target.closest('.pcard');
    if (!card) return;
    const ns = card.dataset.ns;

    // Toggle off if same card clicked twice
    if (selectedNs === ns) {
      card.classList.remove('sel-healthy', 'sel-degraded', 'sel-critical');
      selectedNs = null;
      renderPanel(null);
      return;
    }

    // Deselect previous
    document.querySelectorAll('.pcard').forEach(c =>
      c.classList.remove('sel-healthy', 'sel-degraded', 'sel-critical')
    );
    selectedNs = ns;
    const product = (currentSummaryData?.Products || []).find(p => p.Namespace === ns);
    if (product) {
      card.classList.add('sel-' + statusCls(product.Health));
      openDetail(product);
    }
  });

  // ── Detail drawer (admin drill-down) ──────────────────────────────
  function openDetail(p) {
    const level = statusCls(p.Health);
    const label = p.Health === 'Unhealthy' ? 'critical' : p.Health.toLowerCase();

    document.getElementById('d-ns').textContent    = p.DisplayName || p.Namespace;
    document.getElementById('d-sub').textContent   = `ns/${p.Namespace}`;
    const badge = document.getElementById('d-badge');
    badge.textContent = label; badge.className = 'pbadge ' + level;

    const bar = document.getElementById('d-bar');
    bar.style.width = (p.ScorePercent ?? 0) + '%';
    bar.className   = 'drawer-bar-fill ' + level;
    document.getElementById('d-score').textContent =
      `${p.HealthyCount}/${p.TotalCount} healthy · ${p.ScorePercent}%`;

    const deploys = (p.Services || []).filter(s => s.Kind === 'Deployment');
    const sts     = (p.Services || []).filter(s => s.Kind === 'StatefulSet');

    function svcRows(arr) {
      return arr.map(s => {
        const sc      = statusCls(s.Status);
        const replCls = s.Ready === s.Desired ? 'full' : (s.Ready > 0 ? 'partial' : 'none');
        const reason  = s.Status === 'Healthy'
          ? (s.Reason || `${s.Ready}/${s.Desired} pods ready`)
          : (s.Reason || s.Status);
        return `<div class="svc-row">
          <div class="svc-dot ${sc}"></div>
          <div class="svc-info">
            <div class="svc-name" title="${escHtml(s.Name)}">${escHtml(s.Name)}</div>
            <div class="svc-sub ${sc}">${escHtml(reason)}</div>
          </div>
          <span class="svc-kind">${escHtml(s.Kind)}</span>
          <span class="svc-replicas ${replCls}">${s.Ready}/${s.Desired}</span>
        </div>`;
      }).join('');
    }

    document.getElementById('d-body').innerHTML = [
      deploys.length ? `<div class="svc-section">Services</div>${svcRows(deploys)}`         : '',
      sts.length     ? `<div class="svc-section">Infrastructure</div>${svcRows(sts)}`       : '',
      !deploys.length && !sts.length ? '<div class="svc-section">No workloads found</div>'  : '',
    ].join('');

    document.getElementById('drawer-overlay').classList.add('open');
    requestAnimationFrame(() =>
      document.getElementById('detail-drawer').classList.add('open')
    );
  }

  function closeDetail() {
    document.getElementById('detail-drawer').classList.remove('open');
    document.getElementById('drawer-overlay').classList.remove('open');
    document.querySelectorAll('.pcard').forEach(c =>
      c.classList.remove('sel-healthy', 'sel-degraded', 'sel-critical')
    );
    selectedNs = null;
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

  // ── Export (admin only) ────────────────────────────────────────────
  function toggleExportMenu(e) {
    e.stopPropagation();
    const menu = document.getElementById('export-menu');
    menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
  }
  document.addEventListener('click', () => {
    const menu = document.getElementById('export-menu');
    if (menu) menu.style.display = 'none';
  });
  async function exportData(format) {
    document.getElementById('export-menu').style.display = 'none';
    try {
      const res = await fetch(`/api/export?format=${format}`);
      if (res.status === 403) { showError('Export requires admin role.'); return; }
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const blob = await res.blob();
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href = url; a.download = `k8s-health.${format}`; a.click();
      URL.revokeObjectURL(url);
    } catch(err) {
      showError(`Export failed: ${err.message}`);
    }
  }

  // ── Helpers ────────────────────────────────────────────────────────
  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg; el.style.display = 'block';
  }
  function escHtml(str) {
    return String(str ?? '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Init ───────────────────────────────────────────────────────────
  setInterval(fetchData, REFRESH_MS);
  loadUser();
  checkMode();
  fetchData();
</script>
</body>
</html>
